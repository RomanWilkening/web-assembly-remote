<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Desktop – Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111; color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: #1a1a2e; border-radius: 12px;
      padding: 40px 36px; width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .login-box h1 {
      font-size: 22px; margin-bottom: 8px; color: #fff;
    }
    .login-box p.subtitle {
      font-size: 13px; color: #888; margin-bottom: 24px;
    }
    .login-box label {
      display: block; font-size: 13px; color: #aaa;
      margin-bottom: 4px; margin-top: 16px;
    }
    .login-box input[type="text"],
    .login-box input[type="password"] {
      width: 100%; padding: 10px 12px;
      background: #0f0f23; border: 1px solid #333;
      border-radius: 6px; color: #eee; font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    .login-box input:focus {
      border-color: #4a9eff;
    }
    .login-box button {
      width: 100%; margin-top: 24px; padding: 12px;
      background: #4a9eff; border: none; border-radius: 6px;
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .login-box button:hover { background: #3a8eef; }
    .error {
      background: rgba(255, 60, 60, 0.15); color: #ff6b6b;
      padding: 10px 12px; border-radius: 6px; font-size: 13px;
      margin-top: 16px; display: none;
    }
  </style>
</head>
<body>
  <form class="login-box" method="POST" action="/api/login">
    <h1>🖥️ Remote Desktop</h1>
    <p class="subtitle">Sign in to access the remote session</p>
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required autofocus />
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required />
    <button type="submit">Sign In</button>
    <div class="error">Invalid username or password. Please try again.</div>
  </form>
  <script>
    document.querySelector('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var form = e.target;
      var errorEl = form.querySelector('.error');
      var btn = form.querySelector('button');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        var res = await fetch(form.action, {
          method: 'POST',
          body: new URLSearchParams(new FormData(form)),
          credentials: 'same-origin'
        });
        if (res.ok) {
          // Read the session token from the response body.
          // Even when the server sends Set-Cookie, SSL-inspecting proxies
          // (e.g. Netskope) may strip that header before the browser sees it.
          // Setting the cookie from JavaScript guarantees the session persists.
          var token = (await res.text()).trim();
          if (token) {
            var secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = 'session=' + token + '; path=/; SameSite=Lax; max-age=86400' + secure;
          }
          window.location.href = '/';
        } else {
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (_) {
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
